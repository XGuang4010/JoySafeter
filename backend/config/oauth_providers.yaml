# OAuth/OIDC provider config (see oauth_providers.example.yaml)

providers:
  github:
    enabled: false
    display_name: "GitHub"
    icon: "github"
    template: "github"
    client_id: ${OAUTH_GITHUB_CLIENT_ID}
    client_secret: ${OAUTH_GITHUB_CLIENT_SECRET}

  google:
    enabled: false
    display_name: "Google"
    icon: "google"
    template: "google"
    client_id: ${OAUTH_GOOGLE_CLIENT_ID}
    client_secret: ${OAUTH_GOOGLE_CLIENT_SECRET}

  # JD SSA (non-standard OAuth2)
  # Note: callback domain must be under *.jd.com or JD-allowed domains
  jd:
    enabled: false
    display_name: "JD SSO"
    icon: "building"
    protocol: "jd_sso"
    client_id: ${JD_CLIENT_ID}
    client_secret: ${JD_CLIENT_SECRET}
    authorize_url: ${JD_AUTHORIZE_URL}
    token_url: ${JD_TOKEN_URL}
    userinfo_url: ${JD_USERINFO_URL}
    scope: "openid email"
    user_mapping:
      id: "userId"
      email: "email"
      name: "username"
      avatar: ""

  # Local testing (with mock service)
  local:
    enabled: false
    display_name: "本地测试"
    icon: "key"
    client_id: ${OAUTH_LOCAL_CLIENT_ID}
    client_secret: ${OAUTH_LOCAL_CLIENT_SECRET}
    authorize_url: "http://localhost:9090/authorize"
    token_url: "http://localhost:9090/token"
    userinfo_url: "http://localhost:9090/userinfo"
    scope: "openid email profile"
    user_mapping:
      id: "sub"
      email: "email"
      name: "name"
      avatar: "picture"

settings:
  default_redirect_url: "/chat"
  allow_registration: true
  auto_link_by_email: true
